<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>董恩妤 | 履歷</title>

<style>
body{
    margin:0;
    font-family: "Noto Sans TC", sans-serif;
    background:#f5f2ee;
}

/* 卡片 */
.container{
    width:900px;
    margin:40px auto;
    display:flex;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* 左側 */
.left{
    width:38%;
    background:#e8dfd5;
    padding:30px;
    text-align:center;
    position:relative;
}

/* 裝飾 */
.left::before{
    content:"";
    width:100px;
    height:100px;
    background:#d6c3b0;
    border-radius:50%;
    position:absolute;
    top:-30px;
    left:-30px;
}

/* 右側 */
.right{
    width:62%;
    background:#ffffff;
    padding:30px;
}

/* 照片 */
.profile-photo{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #fff;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* 名字 */
.name{
    font-size:26px;
    margin-top:15px;
    font-weight:bold;
    color:#4e4039;
}

.subtitle{
    color:#8a7f77;
    margin-bottom:20px;
}

/* 標題 */
.section-title{
    background:#d6c3b0;
    padding:6px 12px;
    border-radius:8px;
    display:inline-block;
    margin:15px 0 10px;
    font-size:14px;
    color:#4e4039;
}

/* 內容 */
.info{
    font-size:14px;
    line-height:1.8;
    color:#5c5149;
}

/* 技能條 */
.skill{
    margin:12px 0;
    color:#4e4039;
}

.bar{
    background:#eee;
    height:8px;
    border-radius:10px;
}

.bar div{
    height:8px;
    background:#a1866f;
    border-radius:10px;
}

/* 按鈕 */
button{
    margin-top:10px;
    padding:6px 14px;
    border:none;
    background:#a1866f;
    color:white;
    border-radius:20px;
    cursor:pointer;
}

button:hover{
    background:#8b6f5a;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<!-- 🎵 背景音樂（已修好） -->
<audio id="bgm" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

    <!-- 左 -->
    <div class="left">
        <img src="images/rabbit.jpg" class="profile-photo">

        <div class="name">董恩妤</div>
        <div class="subtitle">ENYU</div>

        <div class="section-title">基本資料</div>
        <div class="info">
            🎓 亞洲大學<br>
            🆔 114024045<br>
            💻 網頁設計學習中
        </div>

        <div class="section-title">自我介紹</div>
        <p id="intro">
            對設計與程式充滿興趣，喜歡用影像與畫面記錄生活。
        </p>

        <button onclick="toggleText()">more</button>

        <p id="more" class="hidden">
            希望未來能將設計、攝影與技術結合，創作更有溫度的作品。
        </p>
    </div>

    <!-- 右 -->
    <div class="right">

        <div class="section-title">學習經歷</div>
        <ul class="info">
            <li>亞洲大學在學</li>
            <li>學習 HTML / CSS / JavaScript</li>
            <li>參與網頁設計專題</li>
        </ul>

        <div class="section-title">技能</div>

        <div class="skill">HTML
            <div class="bar"><div style="width:80%"></div></div>
        </div>

        <div class="skill">CSS
            <div class="bar"><div style="width:75%"></div></div>
        </div>

        <div class="skill">JavaScript
            <div class="bar"><div style="width:60%"></div></div>
        </div>

        <div class="skill">Python
            <div class="bar"><div style="width:65%"></div></div>
        </div>

    </div>

</div>

<script>
// 展開文字
function toggleText(){
    document.getElementById("more").classList.toggle("hidden");
}

// 🎵 音樂播放（保證能播）
const bgm = document.getElementById("bgm");

// 先靜音播放（避免被瀏覽器擋）
bgm.muted = true;
bgm.play();

// 使用者點擊後開聲音
window.addEventListener("click", function(){
    bgm.muted = false;
    bgm.play();
}, { once: true });
</script>

</body>
</html>
