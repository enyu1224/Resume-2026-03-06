<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>董恩妤 | 履歷</title>

<style>
body{
    margin:0;
    font-family: "Noto Sans TC", sans-serif;
    background:#fff0f5;
}

/* 卡片 */
.container{
    width:900px;
    margin:40px auto;
    display:flex;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* 左邊 */
.left{
    width:40%;
    background:#ffe4ec;
    padding:30px;
    text-align:center;
    position:relative;
}

/* 裝飾圓 */
.left::before{
    content:"";
    width:120px;
    height:120px;
    background:#ffd6e0;
    border-radius:50%;
    position:absolute;
    top:-30px;
    left:-30px;
}

/* 右邊 */
.right{
    width:60%;
    background:#ffffff;
    padding:30px;
}

/* 照片 */
.profile-photo{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* 名字 */
.name{
    font-size:26px;
    margin-top:15px;
    font-weight:bold;
}

.subtitle{
    color:#888;
    margin-bottom:20px;
}

/* 標題 */
.section-title{
    background:#ffd6e0;
    padding:6px 12px;
    border-radius:10px;
    display:inline-block;
    margin:15px 0 10px;
    font-size:14px;
}

/* 文字 */
.info{
    font-size:14px;
    line-height:1.8;
}

/* 技能條 */
.skill{
    margin:12px 0;
}

.bar{
    background:#f1f1f1;
    height:8px;
    border-radius:10px;
}

.bar div{
    height:8px;
    background:#ff9bb3;
    border-radius:10px;
}

/* 按鈕 */
button{
    margin-top:10px;
    padding:6px 14px;
    border:none;
    background:#ff9bb3;
    color:white;
    border-radius:20px;
    cursor:pointer;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<div class="container">

    <!-- 左 -->
    <div class="left">
        <img src="images/rabbit.jpg" class="profile-photo">

        <div class="name">董恩妤</div>
        <div class="subtitle">ENYU ✿</div>

        <div class="section-title">基本資料</div>
        <div class="info">
            🎓 亞洲大學<br>
            🆔 114024045<br>
            💻 網頁設計學習中
        </div>

        <div class="section-title">自我介紹</div>
        <p id="intro">
            我喜歡設計與程式，也喜歡記錄生活中的美好瞬間。
        </p>

        <button onclick="toggleText()">more ✨</button>

        <p id="more" class="hidden">
            希望未來能成為能結合設計與技術的人，也想拍出更好看的照片！
        </p>
    </div>

    <!-- 右 -->
    <div class="right">

        <div class="section-title">學習經歷</div>
        <ul>
            <li>亞洲大學在學</li>
            <li>學習 HTML / CSS / JS</li>
            <li>參與課程專題</li>
        </ul>

        <div class="section-title">技能</div>

        <div class="skill">HTML
            <div class="bar"><div style="width:80%"></div></div>
        </div>

        <div class="skill">CSS
            <div class="bar"><div style="width:75%"></div></div>
        </div>

        <div class="skill">JavaScript
            <div class="bar"><div style="width:60%"></div></div>
        </div>

        <div class="skill">Python
            <div class="bar"><div style="width:65%"></div></div>
        </div>

    </div>

</div>

<script>
function toggleText(){
    document.getElementById("more").classList.toggle("hidden");
}
</script>

</body>
</html>
