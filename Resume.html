<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>個人履歷 - 董恩妤</title>

<style>
body{
    margin:0;
    font-family: "Noto Sans TC", sans-serif;
    background:#e9edf5;
}

/* 整體卡片 */
.container{
    width:900px;
    margin:40px auto;
    display:flex;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* 左側 */
.left{
    width:35%;
    background:#dcd6cc;
    padding:30px;
    text-align:center;
}

/* 右側 */
.right{
    width:65%;
    background:#f8f8f8;
    padding:30px;
}

/* 照片 */
.profile-photo{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
}

/* 名字 */
.name{
    font-size:28px;
    margin:15px 0 5px;
    font-weight:bold;
}

.title{
    color:#666;
    margin-bottom:20px;
}

/* 區塊標題 */
.section-title{
    background:#8fb3d9;
    padding:5px 10px;
    margin:20px 0 10px;
    font-weight:bold;
}

/* 左邊資料 */
.info{
    text-align:left;
    font-size:14px;
    line-height:1.8;
}

/* 技能條 */
.skill{
    margin-bottom:10px;
}

.bar{
    background:#ddd;
    height:8px;
    border-radius:5px;
}

.bar div{
    height:8px;
    background:#f4c542;
    border-radius:5px;
}

/* 按鈕 */
button{
    margin-top:15px;
    padding:8px 15px;
    border:none;
    background:#6c8cff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<div class="container">

    <!-- 左側 -->
    <div class="left">
        <img src="images/rabbit.jpg" class="profile-photo">

        <div class="name">董恩妤</div>
        <div class="title">Asia University</div>

        <div class="section-title">基本資料</div>
        <div class="info">
            學號：114024045<br>
            身份：大學生<br>
            技能：HTML / CSS / JS
        </div>

        <div class="section-title">自我介紹</div>
        <p id="intro">
            我正在學習網頁開發與程式設計，對設計與科技有興趣。
        </p>

        <button onclick="toggleText()">查看更多</button>

        <p id="more" class="hidden">
            希望未來能將設計與程式結合，做出更有創意的作品。
        </p>

    </div>

    <!-- 右側 -->
    <div class="right">

        <div class="section-title">學習經歷</div>
        <ul>
            <li>亞洲大學在學</li>
            <li>修習網頁設計與程式課程</li>
            <li>參與專題製作</li>
        </ul>

        <div class="section-title">技能</div>

        <div class="skill">HTML
            <div class="bar"><div style="width:80%"></div></div>
        </div>

        <div class="skill">CSS
            <div class="bar"><div style="width:75%"></div></div>
        </div>

        <div class="skill">JavaScript
            <div class="bar"><div style="width:60%"></div></div>
        </div>

        <div class="skill">Python
            <div class="bar"><div style="width:65%"></div></div>
        </div>

    </div>

</div>

<script>
function toggleText(){
    var more = document.getElementById("more");
    more.classList.toggle("hidden");
}
</script>

</body>
</html>
